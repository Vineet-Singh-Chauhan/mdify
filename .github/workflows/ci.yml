name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: ./backend
        run: pip install poetry && poetry install --with dev
      - name: Ruff lint
        working-directory: ./backend
        run: poetry run ruff check .
      - name: Black format check
        working-directory: ./backend
        run: poetry run black --check .
      - name: MyPy type check
        working-directory: ./backend
        run: poetry run mypy src/
      - name: Bandit security scan
        working-directory: ./backend
        run: poetry run bandit -r src/ -ll

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: ./backend
        run: pip install poetry && poetry install --with dev
      - name: Run tests
        working-directory: ./backend
        run: poetry run pytest --cov=src --cov-report=xml
        env:
          REDIS_URL: redis://localhost:6379/0
          CLAMAV_HOST: localhost
          CLAMAV_PORT: 3310
          MAX_UPLOAD_SIZE_MB: 50
          PURGE_INTERVAL_SECONDS: 600

  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint
        working-directory: ./frontend
        run: npm run lint
      - name: Build
        working-directory: ./frontend
        run: npm run build

  sc001-llm-scan:
    name: SC-001 — Zero LLM API Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for LLM SDK imports
        run: |
          if grep -rE "import (openai|anthropic|cohere|langchain|litellm|tiktoken)" backend/src/; then
            echo "ERROR: LLM SDK import detected in backend source — violates SC-001"
            exit 1
          fi
          echo "SC-001 check passed — no LLM SDK imports found"

  smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Copy .env
        run: cp .env.example .env
      - name: Build and start stack
        run: docker compose up --build -d
      - name: Wait for services
        run: |
          timeout 120 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 5; done'
      - name: Verify all services healthy
        run: docker compose ps
      - name: API health check
        run: curl -f http://localhost:8000/api/v1/health
      - name: Tear down
        if: always()
        run: docker compose down -v
