name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/vineet-singh-chauhan/mdify-backend

jobs:
  # ── Job 1: Build Docker image and push to GitHub Container Registry ──────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Write .env.prod from GitHub Secrets, pull image, restart ──────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: backend-production  # Uses environment-level secrets + protection rules

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml"
          target: "~/mdify"
          strip_components: 0

      - name: Inject secrets and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Pass every app secret as an env var into the SSH session
          envs: >-
            GIT_TOKEN_DEPLOY,
            BACKEND_PORT,
            CORS_ALLOWED_ORIGINS,
            MAX_UPLOAD_SIZE_MB,
            PURGE_INTERVAL_SECONDS
          script: |
            set -e
            cd ~/mdify

            # ── Write .env.prod from GitHub Secrets ──────────────────────────
            # This overwrites on every deploy — GitHub Secrets is the source of truth.
            cat > .env.prod << EOF
            BACKEND_PORT=${BACKEND_PORT:-8000}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
            PURGE_INTERVAL_SECONDS=${PURGE_INTERVAL_SECONDS:-600}
            EOF
            chmod 600 .env.prod

            # ── Pull latest image ─────────────────────────────────────────────
            echo "▶ Logging in to GHCR..."
            echo "$GIT_TOKEN_DEPLOY" | docker login ghcr.io \
              -u vineet-singh-chauhan --password-stdin

            echo "▶ Pulling latest image..."
            docker pull ghcr.io/vineet-singh-chauhan/mdify-backend:latest

            # ── Restart container ─────────────────────────────────────────────
            echo "▶ Restarting backend..."
            docker compose -f docker-compose.prod.yml up -d

            echo "▶ Cleaning up old images..."
            docker image prune -f

            # ── Health check ──────────────────────────────────────────────────
            echo "▶ Verifying deployment (up to 270s)..."
            for i in $(seq 1 18); do
              echo "  attempt $i/18..."
              STATUS=$(curl -sf http://127.0.0.1:${BACKEND_PORT:-8000}/api/v1/health 2>/dev/null || echo "unreachable")
              echo "  response: $STATUS"
              if echo "$STATUS" | grep -q '"status":"healthy"'; then
                echo "✅ Backend is healthy"
                exit 0
              fi
              sleep 15
            done
            echo "❌ Health check failed after 270s — container logs:"
            docker logs mdify-backend-1 --tail 80 || docker logs mdify-backend --tail 80 || true
            echo "--- Docker container status ---"
            docker ps -a
            exit 1
        env:
          GIT_TOKEN_DEPLOY: ${{ secrets.GIT_TOKEN_DEPLOY }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          MAX_UPLOAD_SIZE_MB: ${{ secrets.MAX_UPLOAD_SIZE_MB }}
          PURGE_INTERVAL_SECONDS: ${{ secrets.PURGE_INTERVAL_SECONDS }}
